<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>共創生 世界渡航マップ | 九州大学共創学部</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          navy:  { DEFAULT: '#042C53', light: '#0C447C' },
          ocean: '#c8dde8',
          kyuso: { blue: '#185FA5', teal: '#1D9E75', amber: '#EF9F27' }
        },
        fontFamily: {
          sans: ['"DM Sans"', '"Noto Sans JP"', 'sans-serif']
        }
      }
    }
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html, body { height: 100%; overflow: hidden; font-family: 'DM Sans', 'Noto Sans JP', sans-serif; }

  #map-wrap { position: relative; flex: 1; min-height: 0; background: #c8dde8; overflow: hidden; }
  #map-svg  { width: 100%; height: 100%; display: block; cursor: crosshair; }

  .country { transition: stroke-width 0.12s, stroke 0.12s, filter 0.12s; }
  .country:hover { stroke: #fff !important; stroke-width: 1.4 !important; filter: brightness(1.08); }
  .country.selected { stroke: #FFD700 !important; stroke-width: 2.5 !important; filter: brightness(1.12); }

  #tooltip {
    position: absolute; pointer-events: none; opacity: 0;
    transition: opacity 0.15s; z-index: 40;
    max-width: 265px; min-width: 160px;
  }

  #loading-overlay { transition: opacity 0.4s; }
  #loading-overlay.hidden { opacity: 0; pointer-events: none; }

  #right-panel { overflow-y: auto; }
  #right-panel::-webkit-scrollbar { width: 4px; }
  #right-panel::-webkit-scrollbar-thumb { background: #d0d8e4; border-radius: 2px; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
  .pulse-anim { animation: pulse 1.4s ease-in-out infinite; }

  @keyframes countUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
  .count-anim { animation: countUp 0.35s ease-out; }

  .fbtn {
    padding: 4px 13px; border-radius: 16px; font-size: 12px; cursor: pointer;
    border: 1px solid #d1d5db; background: transparent; color: #6b7280;
    font-family: inherit; transition: all .15s;
  }
  .fbtn:hover { border-color: #9ca3af; }
  .fbtn.active-all    { border-color:#1D9E75; background:#E1F5EE; color:#085041; font-weight:500; }
  .fbtn.active-study  { border-color:#185FA5; background:#EFF6FF; color:#1e40af; font-weight:500; }
  .fbtn.active-travel { border-color:#BA7517; background:#FAEEDA; color:#633806; font-weight:500; }
  .fbtn.active-heat   { border-color:#7c3aed; background:#f5f3ff; color:#5b21b6; font-weight:500; }

  .tbtn {
    flex: 1; padding: 7px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 500;
    border: 1px solid #d1d5db; background: transparent; color: #6b7280;
    font-family: inherit; transition: all .15s;
  }
  .tbtn.tt { border-color:#BA7517; background:#FAEEDA; color:#633806; }
  .tbtn.ts { border-color:#185FA5; background:#EFF6FF; color:#1e40af; }

  input, select, textarea {
    width: 100%; padding: 8px 10px; border: 1px solid #e2e8f0; border-radius: 8px;
    font-size: 13px; font-family: inherit; color: #1e293b; background: white;
    outline: none; transition: border-color .15s;
  }
  input:focus, select:focus, textarea:focus { border-color: #185FA5; }
  textarea { resize: none; line-height: 1.5; }

  @media (max-width: 700px) {
    #app { flex-direction: column !important; }
    #map-col { height: 52vh; flex: none !important; }
    #right-panel { height: 48vh; }
  }
</style>
</head>
<body class="bg-slate-100">
<div id="app" class="flex flex-col h-screen">

  <!-- ══ HEADER ══ -->
  <header class="flex items-center justify-between flex-wrap gap-2 px-5 py-3 text-white shrink-0"
          style="background:#042C53">
    <div>
      <p class="text-[10px] tracking-[2.5px] uppercase" style="color:#85B7EB">Kyushu University · 共創学部</p>
      <h1 class="text-xl font-medium tracking-tight">世界渡航マップ</h1>
    </div>
    <div class="flex items-center gap-2 flex-wrap">
      <div id="sync-badge" class="flex items-center gap-1.5 text-[11px] rounded-md px-2.5 py-1.5 border"
           style="background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25);color:#9FE1CB">
        <span id="sync-dot" class="w-2 h-2 rounded-full pulse-anim" style="background:#9ca3af"></span>
        <span id="sync-label">接続中...</span>
      </div>
      <div class="rounded-lg px-3 py-1.5 text-center border" style="background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2)">
        <div class="text-lg font-medium" id="h-countries" style="color:#85B7EB">0</div>
        <div class="text-[10px]" style="color:#B5D4F4">訪問国数</div>
      </div>
      <div class="rounded-lg px-3 py-1.5 text-center border" style="background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2)">
        <div class="text-lg font-medium" id="h-study" style="color:#5DCAA5">0</div>
        <div class="text-[10px]" style="color:#B5D4F4">留学</div>
      </div>
      <div class="rounded-lg px-3 py-1.5 text-center border" style="background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2)">
        <div class="text-lg font-medium" id="h-travel" style="color:#EF9F27">0</div>
        <div class="text-[10px]" style="color:#B5D4F4">旅行</div>
      </div>
    </div>
  </header>

  <!-- ══ ADVENTURE BANNER ══ -->
  <div class="flex items-center gap-3 px-5 py-2 text-[12px] font-medium shrink-0"
       style="background:#633806;color:#FAEEDA">
    <span id="adv-msg"></span>
    <span id="adv-count" class="ml-auto text-[10px] tracking-wide opacity-80">193カ国中 0カ国制覇</span>
  </div>

  <!-- ══ BODY ══ -->
  <div class="flex flex-1 min-h-0">

    <!-- MAP COLUMN -->
    <div id="map-col" class="flex flex-col flex-1 min-w-0">

      <!-- Filter bar -->
      <div class="flex items-center gap-1.5 px-4 py-2 bg-white border-b border-slate-200 shrink-0 flex-wrap">
        <span class="text-[11px] text-slate-400 mr-1 font-medium">表示：</span>
        <button class="fbtn active-all" data-f="all"    onclick="setFilter(this)">すべて</button>
        <button class="fbtn"            data-f="study"  onclick="setFilter(this)">留学のみ</button>
        <button class="fbtn"            data-f="travel" onclick="setFilter(this)">旅行のみ</button>
        <button class="fbtn"            data-f="heat"   onclick="setFilter(this)">🌡 ヒートマップ</button>
        <span class="ml-auto text-[11px] text-slate-400 hidden lg:block">国をクリック → フォームに自動入力</span>
      </div>

      <!-- Map -->
      <div id="map-wrap">
        <svg id="map-svg" viewBox="0 0 960 500" preserveAspectRatio="xMidYMid meet"></svg>

        <!-- Loading -->
        <div id="loading-overlay"
             class="absolute inset-0 flex items-center justify-center text-[13px] font-medium"
             style="background:rgba(200,221,232,.92);color:#042C53;z-index:30">
          <div class="flex items-center gap-2">
            <svg class="animate-spin w-4 h-4" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="#185FA5" stroke-width="3"
                      stroke-dasharray="31.4" stroke-dashoffset="10"/>
            </svg>
            地図を読み込み中...
          </div>
        </div>

        <!-- Tooltip -->
        <div id="tooltip" class="bg-white rounded-xl border border-slate-200 p-3"
             style="box-shadow:0 4px 24px rgba(4,44,83,.13)">
          <div id="tt-country" class="font-medium text-[14px] text-slate-800 mb-1.5"></div>
          <div id="tt-summary" class="text-[11px] text-slate-400 mb-2 pb-2 border-b border-slate-100"></div>
          <div id="tt-entries" class="space-y-2 max-h-52 overflow-y-auto"></div>
          <div id="tt-hint" class="mt-2 pt-2 border-t border-slate-100 text-[11px] font-medium" style="color:#185FA5"></div>
        </div>

        <!-- Selected badge -->
        <div id="selected-badge"
             class="absolute top-3 left-1/2 -translate-x-1/2 hidden items-center gap-2
                    bg-yellow-50 border border-yellow-300 rounded-full px-3 py-1
                    text-[12px] font-medium text-yellow-800 shadow-sm">
          <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"/>
          </svg>
          <span id="badge-text"></span>
          <button onclick="clearSelection()" class="ml-1 text-yellow-500 hover:text-yellow-800 font-bold">×</button>
        </div>

        <!-- Legend -->
        <div class="absolute bottom-3 left-3 bg-white/92 border border-blue-200 rounded-lg
                    px-3 py-2 flex flex-wrap gap-3 items-center text-[11px]"
             style="color:#042C53">
          <div id="leg-normal" class="flex gap-3 items-center flex-wrap">
            <div class="flex items-center gap-1.5">
              <div class="w-3.5 h-3.5 rounded-sm" style="background:#185FA5"></div>留学
            </div>
            <div class="flex items-center gap-1.5">
              <div class="w-3.5 h-3.5 rounded-sm" style="background:#EF9F27"></div>旅行
            </div>
            <div class="flex items-center gap-1.5">
              <div class="w-3.5 h-3.5 rounded-sm"
                   style="background:linear-gradient(90deg,#185FA5 50%,#EF9F27 50%)"></div>両方
            </div>
            <div class="flex items-center gap-1.5">
              <div class="w-3.5 h-3.5 rounded-sm bg-slate-300"></div>未訪問
            </div>
          </div>
          <div id="leg-heat" class="hidden items-center gap-1.5">
            <div class="flex h-3.5 w-20 rounded-sm overflow-hidden">
              <div style="flex:1;background:#DBEAFE"></div>
              <div style="flex:1;background:#93C5FD"></div>
              <div style="flex:1;background:#3B82F6"></div>
              <div style="flex:1;background:#1D4ED8"></div>
              <div style="flex:1;background:#1e3a8a"></div>
            </div>
            <span>投稿数（少→多）</span>
          </div>
        </div>
      </div><!-- /map-wrap -->
    </div><!-- /map-col -->

    <!-- RIGHT PANEL -->
    <aside id="right-panel" class="w-[280px] bg-white border-l border-slate-200 flex flex-col shrink-0">

      <!-- Stats -->
      <div class="p-4 shrink-0">
        <p class="text-[10px] tracking-[2px] uppercase text-slate-400 font-medium mb-3">統計パネル</p>
        <div class="grid grid-cols-2 gap-2 mb-3">
          <div class="bg-slate-50 rounded-lg p-3">
            <div class="text-2xl font-semibold count-anim" id="s-countries" style="color:#0C447C">0</div>
            <div class="text-[11px] mt-0.5" style="color:#378ADD">訪問国数</div>
          </div>
          <div class="bg-slate-50 rounded-lg p-3">
            <div class="text-2xl font-semibold count-anim" id="s-total" style="color:#085041">0</div>
            <div class="text-[11px] mt-0.5" style="color:#1D9E75">総投稿数</div>
          </div>
        </div>
        <!-- Progress -->
        <div class="mb-3">
          <div class="flex justify-between text-[11px] text-slate-400 mb-1">
            <span>世界制覇率</span><span id="progress-pct">0%</span>
          </div>
          <div class="h-1.5 bg-slate-100 rounded-full overflow-hidden">
            <div id="progress-bar" class="h-full rounded-full transition-all duration-700"
                 style="width:0%;background:linear-gradient(90deg,#185FA5,#1D9E75)"></div>
          </div>
        </div>
        <p class="text-[11px] font-medium text-slate-400 mb-2">人気の国 TOP 3</p>
        <div id="top3">
          <p class="text-[12px] text-slate-400 text-center py-3">まだ渡航情報がありません</p>
        </div>
      </div>

      <div class="h-px bg-slate-200 mx-4 shrink-0"></div>

      <!-- Form -->
      <div class="p-4 shrink-0">
        <p class="text-[10px] tracking-[2px] uppercase text-slate-400 font-medium mb-3">渡航を追加</p>

        <div id="flash"
             class="hidden mb-3 bg-emerald-50 border border-emerald-300 rounded-lg px-3 py-2
                    text-[12px] font-medium text-emerald-800">
          追加しました！みんなの地図に反映されました ✓
        </div>
        <div id="err"
             class="hidden mb-3 bg-red-50 border border-red-200 rounded-lg px-3 py-2
                    text-[12px] text-red-700"></div>

        <div class="space-y-2.5">
          <div>
            <label class="block text-[12px] text-slate-500 mb-1">
              ニックネーム <span class="text-red-400">*</span>
            </label>
            <input id="f-nick" placeholder="例：Haruki">
          </div>
          <div>
            <label class="block text-[12px] text-slate-500 mb-1">
              種類 <span class="text-red-400">*</span>
            </label>
            <div class="flex gap-2">
              <button class="tbtn tt" data-t="travel" onclick="setType(this)">旅行</button>
              <button class="tbtn"    data-t="study"  onclick="setType(this)">留学</button>
            </div>
          </div>
          <div>
            <label class="block text-[12px] text-slate-500 mb-1">
              国名 <span class="text-red-400">*</span>
              <span class="ml-1 text-[10px]" style="color:#185FA5">地図からも選択可</span>
            </label>
            <select id="f-country"><option value="">選択してください</option></select>
          </div>
          <div>
            <label class="block text-[12px] text-slate-500 mb-1" id="f-detail-label">
              おすすめスポット <span class="text-red-400">*</span>
            </label>
            <input id="f-detail" placeholder="例：グランドキャニオン">
          </div>
          <div>
            <label class="block text-[12px] text-slate-500 mb-1">
              一言コメント <span class="text-red-400">*</span>
            </label>
            <textarea id="f-comment" rows="3" placeholder="渡航の感想を一言"></textarea>
          </div>
          <button id="submit-btn" onclick="submitEntry()"
                  class="w-full py-2.5 rounded-lg text-white text-[13px] font-medium
                         transition-all hover:opacity-85 active:scale-[.98] disabled:opacity-50"
                  style="background:#042C53">
            地図に追加する
          </button>
        </div>
      </div>

      <div class="h-px bg-slate-200 mx-4 shrink-0"></div>

      <!-- Recent -->
      <div class="p-4">
        <p class="text-[10px] tracking-[2px] uppercase text-slate-400 font-medium mb-2">最近の投稿</p>
        <div id="recent-list">
          <p class="text-[12px] text-slate-400 text-center py-3">まだ投稿がありません</p>
        </div>
      </div>

    </aside>
  </div>
</div>

  "729":"Sudan","706":"Somalia","716":"Zimbabwe","894":"Zambia","508":"Mozambique",
  "682":"Saudi Arabia","784":"UAE","634":"Qatar","414":"Kuwait","512":"Oman",
  "364":"Iran","368":"Iraq","376":"Israel","400":"Jordan","422":"Lebanon",
  "398":"Kazakhstan","860":"Uzbekistan","031":"Azerbaijan","268":"Georgia","051":"Armenia",
  "586":"Pakistan","050":"Bangladesh","144":"Sri Lanka","524":"Nepal","104":"Myanmar",
  "116":"Cambodia","418":"Laos","496":"Mongolia","458":"Malaysia","608":"Philippines",
  "360":"Indonesia","158":"Taiwan","704":"Vietnam","646":"Rwanda","450":"Madagascar",
};

const STUDY_COLOR    = '#185FA5';
const TRAVEL_COLOR   = '#EF9F27';
const UNVISITED_CLR  = '#D1D5DB';
const HEAT_RAMP      = ['#DBEAFE','#93C5FD','#60A5FA','#3B82F6','#1D4ED8','#1e3a8a'];

/* ── State ── */
let entries         = [];
let currentType     = 'travel';
let currentFilter   = 'all';
let selectedCountry = null;
let svgEl, geoFeatures = [], d3ref;

/* ── Populate select ── */
const countrySelect = document.getElementById('f-country');
[...COUNTRIES_LIST].sort((a,b) => a.localeCompare(b)).forEach(name => {
  const o = document.createElement('option');
  o.value = name;
  o.textContent = (EMOJIS[name]||'🌍') + ' ' + name;
  countrySelect.appendChild(o);
});

/* ════════════════════════════════════════════════════
   Helpers
════════════════════════════════════════════════════ */
function getStats(name, filter) {
  let es = entries.filter(e => e.country === name);
  if (filter !== 'all' && filter !== 'heat') es = es.filter(e => e.type === filter);
  return {
    total:   es.length,
    study:   es.filter(e => e.type === 'study').length,
    travel:  es.filter(e => e.type === 'travel').length,
    entries: es,
  };
}

function heatColor(count, maxCount) {
  if (count === 0 || maxCount === 0) return UNVISITED_CLR;
  const idx = Math.min(
    Math.ceil((count / maxCount) * (HEAT_RAMP.length - 1)),
    HEAT_RAMP.length - 1
  );
  return HEAT_RAMP[idx];
}

function buildPatterns(d3, features) {
  const defs = svgEl.select('defs');
  features.forEach(f => {
    const id = 'pat_' + f.properties.name.replace(/[^a-zA-Z]/g,'_');
    if (defs.select('#' + id).empty()) {
      defs.append('pattern')
        .attr('id', id).attr('patternUnits','userSpaceOnUse')
        .attr('width', 10).attr('height', 10)
        .call(p => {
          p.append('rect').attr('width',5).attr('height',10).attr('fill', STUDY_COLOR);
          p.append('rect').attr('x',5).attr('width',5).attr('height',10).attr('fill', TRAVEL_COLOR);
        });
    }
  });
}

/* ════════════════════════════════════════════════════
   Render map colours
════════════════════════════════════════════════════ */
function renderMap() {
  if (!svgEl || !geoFeatures.length) return;
  const isHeat  = currentFilter === 'heat';
  const maxCnt  = isHeat
    ? Math.max(...geoFeatures.map(f => getStats(f.properties.name,'heat').total), 1)
    : 1;

  svgEl.selectAll('path.country').each(function(d) {
    const name = d.properties.name;
    const el   = d3ref.select(this);

    el.classed('selected', name === selectedCountry);

    if (isHeat) {
      el.attr('fill', heatColor(getStats(name,'heat').total, maxCnt));
      return;
    }
    const { study, travel } = getStats(name, currentFilter);
    const total = study + travel;
    if (!total)   { el.attr('fill', UNVISITED_CLR); return; }
    if (!study)   { el.attr('fill', TRAVEL_COLOR);  return; }
    if (!travel)  { el.attr('fill', STUDY_COLOR);   return; }
    el.attr('fill', `url(#pat_${name.replace(/[^a-zA-Z]/g,'_')})`);
  });

  svgEl.selectAll('path.country')
    .style('cursor', d => getStats(d.properties.name,'all').total > 0 ? 'pointer' : 'crosshair');
}

/* ════════════════════════════════════════════════════
   Stats panel
════════════════════════════════════════════════════ */
function animNum(id, val) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = val;
  el.classList.remove('count-anim'); void el.offsetWidth; el.classList.add('count-anim');
}

function updateStats() {
  const visited = [...new Set(entries.map(e => e.country))];
  const pct     = Math.round(visited.length / 193 * 100);
  animNum('h-countries', visited.length);
  animNum('h-study',     entries.filter(e=>e.type==='study').length);
  animNum('h-travel',    entries.filter(e=>e.type==='travel').length);
  animNum('s-countries', visited.length);
  animNum('s-total',     entries.length);
  document.getElementById('adv-count').textContent    = `193カ国中 ${visited.length}カ国制覇`;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-bar').style.width = pct + '%';

  /* TOP 3 */
  const counts = {};
  entries.forEach(e => { counts[e.country] = (counts[e.country]||0)+1; });
  const top3 = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,3);
  document.getElementById('top3').innerHTML = top3.length === 0
    ? '<p class="text-[12px] text-slate-400 text-center py-3">まだ渡航情報がありません</p>'
    : top3.map(([c,n],i) => `
        <div class="flex items-center gap-2 px-2.5 py-1.5 rounded-lg mb-1 ${i===0?'bg-amber-50':'bg-slate-50'}">
          <span class="text-[13px] font-semibold w-5 ${i===0?'text-amber-500':'text-slate-400'}">#${i+1}</span>
          <span class="text-[12px] flex-1 text-slate-700">${EMOJIS[c]||'🌍'} ${c}</span>
          <span class="text-[11px] text-slate-400">${n}件</span>
        </div>`).join('');

  /* Recent */
  document.getElementById('recent-list').innerHTML = entries.length === 0
    ? '<p class="text-[12px] text-slate-400 text-center py-3">まだ投稿がありません</p>'
    : [...entries].reverse().slice(0,5).map(e => `
        <div class="flex items-start gap-2 px-2.5 py-2 rounded-lg bg-slate-50 mb-1">
          <div class="w-1.5 h-1.5 rounded-full mt-[5px] shrink-0"
               style="background:${e.type==='study'?STUDY_COLOR:TRAVEL_COLOR}"></div>
          <div>
            <div class="text-[12px] font-medium text-slate-700">${e.nickname} — ${EMOJIS[e.country]||'🌍'}${e.country}</div>
            <div class="text-[11px] text-slate-400 mt-0.5 leading-snug">${e.comment}</div>
          </div>
        </div>`).join('');
}

/* ════════════════════════════════════════════════════
   Tooltip
════════════════════════════════════════════════════ */
const tooltip = document.getElementById('tooltip');
function showTooltip(event, name) {
  const s = getStats(name, 'all');
  document.getElementById('tt-country').textContent = (EMOJIS[name]||'🌍') + ' ' + name;

  if (s.total === 0) {
    document.getElementById('tt-summary').textContent = 'まだ投稿がありません';
    document.getElementById('tt-entries').innerHTML   = '';
  } else {
    document.getElementById('tt-summary').textContent =
      `合計 ${s.total}人（留学 ${s.study} / 旅行 ${s.travel}）`;
    document.getElementById('tt-entries').innerHTML = s.entries.map(e => `
      <div class="border-l-[3px] pl-2 mb-2"
           style="border-color:${e.type==='study'?STUDY_COLOR:TRAVEL_COLOR}">
        <div class="flex items-center gap-1.5">
          <span class="text-[12px] font-medium text-slate-800">${e.nickname}</span>
          <span class="text-[10px] px-1.5 py-0.5 rounded-full font-medium"
                style="background:${e.type==='study'?'#EFF6FF':'#FAEEDA'};
                       color:${e.type==='study'?'#1e40af':'#633806'}">
            ${e.type==='study'?'留学':'旅行'}
          </span>
        </div>
        <div class="text-[11px] text-slate-500 mt-0.5">${e.type==='study'?'🎓':'📍'} ${e.detail}</div>
        <div class="text-[11px] text-slate-600 italic mt-0.5">"${e.comment}"</div>
      </div>`).join('');
  }
  document.getElementById('tt-hint').textContent =
    COUNTRIES_LIST.includes(name) ? 'クリックでフォームに自動入力 →' : '';

  const wRect = document.getElementById('map-wrap').getBoundingClientRect();
  let x = event.clientX - wRect.left + 14;
  let y = event.clientY - wRect.top  + 14;
  if (x + 275 > wRect.width)  x = event.clientX - wRect.left - 280;
  if (y + 300 > wRect.height) y = event.clientY - wRect.top  - 280;
  tooltip.style.left    = Math.max(4, x) + 'px';
  tooltip.style.top     = Math.max(4, y) + 'px';
  tooltip.style.opacity = '1';
}
function hideTooltip() { tooltip.style.opacity = '0'; }

/* ════════════════════════════════════════════════════
   Click-to-select
════════════════════════════════════════════════════ */
function selectCountry(name) {
  selectedCountry = name;
  const opt = [...countrySelect.options].find(o => o.value === name);
  if (opt) countrySelect.value = name;

  const badge = document.getElementById('selected-badge');
  badge.classList.remove('hidden'); badge.classList.add('flex');
  document.getElementById('badge-text').textContent = (EMOJIS[name]||'🌍') + ' ' + name;

  renderMap();
}

window.clearSelection = () => {
  selectedCountry = null;
  document.getElementById('selected-badge').classList.add('hidden');
  document.getElementById('selected-badge').classList.remove('flex');
  renderMap();
};

/* ════════════════════════════════════════════════════
   D3 map init
════════════════════════════════════════════════════ */
Promise.all([
  import('https://cdn.jsdelivr.net/npm/d3@7/+esm'),
  import('https://cdn.jsdelivr.net/npm/topojson-client@3/+esm'),
  fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(r => r.json())
]).then(([d3, topojson, world]) => {
  d3ref = d3;

  const countries = topojson.feature(world, world.objects.countries);
  geoFeatures     = countries.features;
  geoFeatures.forEach(f => {
    if (!f.properties) f.properties = {};
    const m = NAME_MAP[String(f.id).padStart(3,'0')];
    if (m) f.properties.name = m;
    else if (!f.properties.name) f.properties.name = 'Unknown';
  });

  const svg    = d3.select('#map-svg');
  svgEl        = svg;
  svg.style('background','#c8dde8');
  svg.append('defs');
  buildPatterns(d3, geoFeatures);

  const proj   = d3.geoNaturalEarth1().scale(153).translate([480, 250]);
  const pathFn = d3.geoPath(proj);

  svg.selectAll('path.country')
    .data(geoFeatures).join('path')
    .attr('class','country')
    .attr('d', pathFn)
    .attr('stroke','#ffffff')
    .attr('stroke-width', 0.4)
    .attr('fill', UNVISITED_CLR)
    .on('mousemove', (event, d) => showTooltip(event, d.properties.name))
    .on('mouseleave', () => hideTooltip())
    .on('click', (_, d) => {
      const name = d.properties.name;
      if (COUNTRIES_LIST.includes(name)) { selectCountry(name); hideTooltip(); }
    });

  svg.append('path')
    .datum(topojson.mesh(world, world.objects.countries, (a,b) => a !== b))
    .attr('fill','none').attr('stroke','#ffffff').attr('stroke-width',0.3).attr('d', pathFn);

  document.getElementById('loading-overlay').classList.add('hidden');

  /* Firebase listener */
  onValue(entriesRef, snap => {
    const data = snap.val();
    entries    = data ? Object.values(data) : [];
    buildPatterns(d3, geoFeatures);
    renderMap();
    updateStats();
    const dot = document.getElementById('sync-dot');
    dot.style.background = '#1D9E75';
    dot.classList.remove('pulse-anim');
    document.getElementById('sync-label').textContent = 'リアルタイム同期中';
  }, () => {
    const dot = document.getElementById('sync-dot');
    dot.style.background = '#EF4444';
    document.getElementById('sync-label').textContent = '接続エラー';
  });

}).catch(err => {
  console.error(err);
  document.getElementById('loading-overlay').textContent = '地図の読み込みに失敗しました';
});

/* ════════════════════════════════════════════════════
   UI handlers (global)
════════════════════════════════════════════════════ */
window.setFilter = btn => {
  currentFilter = btn.dataset.f;
  document.querySelectorAll('.fbtn').forEach(b => {
    b.className = 'fbtn';
    if (b.dataset.f === currentFilter) b.classList.add(`active-${currentFilter}`);
  });
  const isHeat = currentFilter === 'heat';
  document.getElementById('leg-normal').classList.toggle('hidden', isHeat);
  document.getElementById('leg-heat').classList.toggle('hidden', !isHeat);
  if (!isHeat) document.getElementById('leg-heat').classList.remove('flex');
  if (isHeat)  document.getElementById('leg-heat').classList.add('flex');
  renderMap();
};

window.setType = btn => {
  currentType = btn.dataset.t;
  document.querySelectorAll('.tbtn').forEach(b => { b.className = 'tbtn'; });
  btn.classList.add(currentType === 'study' ? 'ts' : 'tt');
  const isStudy = currentType === 'study';
  document.getElementById('f-detail-label').innerHTML =
    (isStudy ? '大学名' : 'おすすめスポット') + ' <span class="text-red-400">*</span>';
  document.getElementById('f-detail').placeholder =
    isStudy ? '例：University of Edinburgh' : '例：グランドキャニオン';
};

window.submitEntry = async () => {
  const nick    = document.getElementById('f-nick').value.trim();
  const country = document.getElementById('f-country').value;
  const detail  = document.getElementById('f-detail').value.trim();
  const comment = document.getElementById('f-comment').value.trim();
  const err     = document.getElementById('err');
  const flash   = document.getElementById('flash');
  const btn     = document.getElementById('submit-btn');

  const fail = msg => { err.textContent = msg; err.classList.remove('hidden'); };
  err.classList.add('hidden');

  if (!nick)    return fail('ニックネームを入力してください');
  if (!country) return fail('国名を選択してください');
  if (!detail)  return fail((currentType==='study'?'大学名':'おすすめスポット')+'を入力してください');
  if (!comment) return fail('コメントを入力してください');

  btn.disabled = true; btn.textContent = '送信中...';
  try {
    await push(entriesRef, {
      nickname: nick, country, type: currentType,
      comment, detail, timestamp: Date.now()
    });
    ['f-nick','f-country','f-detail','f-comment'].forEach(id =>
      document.getElementById(id).value = '');
    clearSelection();
    flash.classList.remove('hidden');
    setTimeout(() => flash.classList.add('hidden'), 2500);
  } catch {
    fail('送信に失敗しました。もう一度お試しください。');
  }
  btn.disabled = false; btn.textContent = '地図に追加する';
};
</script>
