<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>共創生 世界渡航マップ | 九州大学共創学部</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Sans:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #042C53;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --blue-mid: #85B7EB;
    --teal: #1D9E75;
    --teal-light: #E1F5EE;
    --amber: #EF9F27;
    --amber-dark: #BA7517;
    --amber-light: #FAEEDA;
    --ocean: #c8dde8;
    --gray-light: #D3D1C7;
    --study: #185FA5;
    --travel: #EF9F27;
  }

  html, body { height: 100%; font-family: 'DM Sans', 'Noto Sans JP', sans-serif; background: #f0f4f8; }

  #app {
    display: grid;
    grid-template-columns: 1fr 300px;
    grid-template-rows: auto auto auto 1fr;
    height: 100vh;
    min-height: 600px;
  }

  /* Header */
  #header {
    grid-column: 1 / -1;
    background: var(--navy);
    color: white;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  .header-left .sub {
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--blue-mid);
    margin-bottom: 3px;
  }
  .header-left .title {
    font-size: 20px;
    font-weight: 500;
    color: white;
    letter-spacing: 0.3px;
  }
  .header-stats { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .stat-pill {
    background: rgba(255,255,255,0.1);
    border: 0.5px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 7px 14px;
    text-align: center;
  }
  .stat-pill .n { font-size: 18px; font-weight: 500; }
  .stat-pill .l { font-size: 10px; color: #B5D4F4; margin-top: 1px; }
  #sync-badge {
    background: rgba(255,255,255,0.1);
    border: 0.5px solid rgba(255,255,255,0.25);
    border-radius: 6px;
    padding: 5px 11px;
    font-size: 11px;
    color: #9FE1CB;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #sync-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #888;
    transition: background 0.3s;
  }
  #sync-dot.connected { background: var(--teal); }
  #sync-dot.error { background: #E24B4A; }

  /* Adventure banner */
  #adventure {
    grid-column: 1 / -1;
    background: #633806;
    color: var(--amber-light);
    padding: 8px 20px;
    font-size: 12px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #adv-count { margin-left: auto; font-size: 10px; letter-spacing: 1px; opacity: 0.8; }

  /* Filter bar */
  #filter-bar {
    background: white;
    border-bottom: 1px solid #e8edf2;
    padding: 8px 16px;
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .fbtn {
    padding: 4px 13px;
    border-radius: 16px;
    font-size: 12px;
    cursor: pointer;
    border: 1px solid #d0d8e0;
    background: transparent;
    color: #666;
    font-family: inherit;
    transition: all 0.15s;
  }
  .fbtn:hover { border-color: #aaa; }
  .fbtn.active-all { border-color: var(--teal); background: var(--teal-light); color: #085041; font-weight: 500; }
  .fbtn.active-study { border-color: var(--blue); background: var(--blue-light); color: #0C447C; font-weight: 500; }
  .fbtn.active-travel { border-color: var(--amber-dark); background: var(--amber-light); color: #633806; font-weight: 500; }

  /* Map */
  #map-col { display: flex; flex-direction: column; grid-row: 3 / 5; }
  #filter-bar { grid-column: 1; }
  #map-wrap {
    flex: 1;
    position: relative;
    background: var(--ocean);
    overflow: hidden;
    min-height: 0;
  }
  #map-svg { width: 100%; height: 100%; display: block; }

  #loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(200,221,232,0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    color: var(--navy);
    z-index: 30;
    transition: opacity 0.4s;
  }
  #loading-overlay.hidden { opacity: 0; pointer-events: none; }

  #legend {
    position: absolute;
    bottom: 12px;
    left: 12px;
    background: rgba(255,255,255,0.93);
    border: 1px solid #B5D4F4;
    border-radius: 8px;
    padding: 8px 13px;
    display: flex;
    gap: 13px;
    align-items: center;
    font-size: 11px;
    color: var(--navy);
  }
  .leg-item { display: flex; align-items: center; gap: 5px; }
  .leg-swatch { width: 14px; height: 14px; border-radius: 2px; flex-shrink: 0; }

  /* Tooltip */
  #tooltip {
    position: absolute;
    background: white;
    border: 1px solid #d0d8e4;
    border-radius: 10px;
    padding: 13px 15px;
    font-size: 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 250px;
    z-index: 20;
    box-shadow: 0 4px 20px rgba(4,44,83,0.12);
  }
  .tt-country { font-size: 14px; font-weight: 500; color: #111; margin-bottom: 9px; }
  .tt-entry { border-left: 3px solid #ccc; padding-left: 9px; margin-bottom: 8px; }
  .tt-entry:last-child { margin-bottom: 0; }
  .tt-name { font-weight: 500; font-size: 12px; color: #111; display: flex; align-items: center; gap: 5px; }
  .tt-badge { font-size: 10px; padding: 1px 7px; border-radius: 8px; font-weight: 500; }
  .tt-detail { font-size: 11px; color: #666; margin-top: 2px; }
  .tt-comment { font-size: 11px; color: #333; margin-top: 3px; font-style: italic; }

  /* Right panel */
  #right {
    background: white;
    border-left: 1px solid #e8edf2;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    grid-row: 2 / 5;
    grid-column: 2;
  }

  #stats { padding: 16px 15px 12px; }
  .panel-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #999;
    font-weight: 500;
    margin-bottom: 11px;
  }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .m-card { background: #f5f7fa; border-radius: 8px; padding: 10px 12px; }
  .m-card .n { font-size: 22px; font-weight: 500; }
  .m-card .l { font-size: 11px; margin-top: 2px; }

  .top3-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; border-radius: 8px;
    background: #f5f7fa; margin-bottom: 5px;
  }
  .top3-gold { background: var(--amber-light) !important; }

  .divider { height: 1px; background: #e8edf2; margin: 0 15px; }

  /* Form */
  #form-section { padding: 15px; }
  .field-label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
  .req { color: #E24B4A; }
  .field-wrap { margin-bottom: 11px; }
  .type-row { display: flex; gap: 6px; }
  .tbtn {
    flex: 1; padding: 7px; border-radius: 8px; cursor: pointer;
    font-size: 12px; font-weight: 500; border: 1px solid #d0d8e0;
    background: transparent; color: #666; font-family: inherit; transition: all 0.15s;
  }
  .tbtn.tt { border-color: var(--amber-dark); background: var(--amber-light); color: #633806; }
  .tbtn.ts { border-color: var(--blue); background: var(--blue-light); color: #0C447C; }

  input, select, textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #d0d8e0;
    border-radius: 7px;
    font-size: 13px;
    font-family: inherit;
    color: #111;
    background: white;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--blue); }
  textarea { resize: vertical; line-height: 1.5; }

  #submit-btn {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    background: var(--navy);
    color: white;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    letter-spacing: 0.3px;
    transition: opacity 0.15s, transform 0.1s;
  }
  #submit-btn:hover { opacity: 0.87; }
  #submit-btn:active { transform: scale(0.98); }
  #submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  #flash {
    display: none;
    background: var(--teal-light);
    border: 1px solid #5DCAA5;
    border-radius: 8px;
    padding: 8px 11px;
    font-size: 12px;
    color: #085041;
    margin-bottom: 11px;
    font-weight: 500;
  }
  #err {
    display: none;
    background: #FCEBEB;
    border: 1px solid #F09595;
    border-radius: 8px;
    padding: 8px 11px;
    font-size: 12px;
    color: #791F1F;
    margin-bottom: 11px;
  }

  /* Recent */
  #recent { padding: 13px 15px; border-top: 1px solid #e8edf2; }
  .r-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 8px 10px; border-radius: 8px;
    background: #f5f7fa; margin-bottom: 5px;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .r-head { font-size: 12px; font-weight: 500; color: #111; }
  .r-txt { font-size: 11px; color: #666; margin-top: 1px; line-height: 1.4; }
  .empty-msg { font-size: 12px; color: #999; text-align: center; padding: 14px 0; }

  /* Responsive */
  @media (max-width: 700px) {
    #app { grid-template-columns: 1fr; grid-template-rows: auto auto auto 420px auto; }
    #right { grid-row: 5; grid-column: 1; border-left: none; border-top: 1px solid #e8edf2; max-height: 420px; }
    #map-col { grid-row: 4; }
    #filter-bar { grid-column: 1; }
  }
</style>
</head>

<div id="app">

  <header id="header">
    <div class="header-left">
      <div class="sub">Kyushu University · 共創学部</div>
      <div class="title">世界渡航マップ</div>
    </div>
    <div class="header-stats">
      <div id="sync-badge"><div id="sync-dot"></div><span id="sync-label">接続中...</span></div>
      <div class="stat-pill"><div class="n" id="h-countries" style="color:#85B7EB">0</div><div class="l">訪問国数</div></div>
      <div class="stat-pill"><div class="n" id="h-study" style="color:#5DCAA5">0</div><div class="l">留学</div></div>
      <div class="stat-pill"><div class="n" id="h-travel" style="color:#EF9F27">0</div><div class="l">旅行</div></div>
    </div>
  </header>

  <div id="adventure">
    <span id="adv-msg"></span>
    <span id="adv-count">193カ国中 0カ国制覇</span>
  </div>

  <div id="filter-bar">
    <button class="fbtn active-all" data-f="all" onclick="setFilter(this)">すべて</button>
    <button class="fbtn" data-f="study" onclick="setFilter(this)">留学のみ</button>
    <button class="fbtn" data-f="travel" onclick="setFilter(this)">旅行のみ</button>
  </div>

  <div id="map-col">
    <div id="map-wrap">
      <svg id="map-svg" viewBox="0 0 960 500" preserveAspectRatio="xMidYMid meet"></svg>
      <div id="loading-overlay">地図を読み込み中...</div>
      <div id="tooltip"></div>
      <div id="legend">
        <div class="leg-item"><div class="leg-swatch" style="background:#185FA5"></div>留学</div>
        <div class="leg-item"><div class="leg-swatch" style="background:#EF9F27"></div>旅行</div>
        <div class="leg-item"><div class="leg-swatch" style="background:linear-gradient(90deg,#185FA5 50%,#EF9F27 50%)"></div>両方</div>
        <div class="leg-item"><div class="leg-swatch" style="background:#D3D1C7"></div>未訪問</div>
      </div>
    </div>
  </div>

  <aside id="right">
    <div id="stats">
      <div class="panel-label">統計パネル</div>
      <div class="stat-grid">
        <div class="m-card"><div class="n" id="s-countries" style="color:#0C447C">0</div><div class="l" style="color:#378ADD">訪問国数</div></div>
        <div class="m-card"><div class="n" id="s-total" style="color:#085041">0</div><div class="l" style="color:#1D9E75">総投稿数</div></div>
      </div>
      <div class="panel-label" style="margin-bottom:8px">人気の国 TOP 3</div>
      <div id="top3"><div class="empty-msg">まだ渡航情報がありません</div></div>
    </div>

    <div class="divider"></div>

    <div id="form-section">
      <div class="panel-label">渡航を追加</div>
      <div id="flash">追加しました！みんなの地図に反映されました ✓</div>
      <div id="err"></div>

      <div class="field-wrap">
        <label class="field-label">ニックネーム <span class="req">*</span></label>
        <input id="f-nick" placeholder="例：Haruki">
      </div>
      <div class="field-wrap">
        <label class="field-label">種類 <span class="req">*</span></label>
        <div class="type-row">
          <button class="tbtn tt" data-t="travel" onclick="setType(this)">旅行</button>
          <button class="tbtn" data-t="study" onclick="setType(this)">留学</button>
        </div>
      </div>
      <div class="field-wrap">
        <label class="field-label">国名 <span class="req">*</span></label>
        <select id="f-country"><option value="">選択してください</option></select>
      </div>
      <div class="field-wrap">
        <label class="field-label" id="f-detail-label">おすすめスポット <span class="req">*</span></label>
        <input id="f-detail" placeholder="例：グランドキャニオン">
      </div>
      <div class="field-wrap">
        <label class="field-label">一言コメント <span class="req">*</span></label>
        <textarea id="f-comment" rows="3" placeholder="渡航の感想を一言"></textarea>
      </div>
      <button id="submit-btn" onclick="submitEntry()">地図に追加する</button>
    </div>

    <div id="recent">
      <div class="panel-label">最近の投稿</div>
      <div id="recent-list"><div class="empty-msg">まだ投稿がありません</div></div>
    </div>
  </aside>

</div>

  "116":"Cambodia","418":"Laos","496":"Mongolia","458":"Malaysia","608":"Philippines",
  "360":"Indonesia","158":"Taiwan","704":"Vietnam","646":"Rwanda","450":"Madagascar",
};

const STUDY_COLOR = '#185FA5';
const TRAVEL_COLOR = '#EF9F27';
const UNVISITED_COLOR = '#D3D1C7';

// ============================================================
//  アプリ状態
// ============================================================
let entries = [];
let currentType = 'travel';
let currentFilter = 'all';
let svgEl, geoFeatures = [];

// 国名セレクト生成
const sel = document.getElementById('f-country');
[...COUNTRIES_LIST].sort((a,b) => a.localeCompare(b)).forEach(name => {
  const o = document.createElement('option');
  o.value = name;
  o.textContent = (EMOJIS[name] || '🌍') + ' ' + name;
  sel.appendChild(o);
});

// ============================================================
//  地図描画
// ============================================================
function getCountryStats(name, filter) {
  let es = entries.filter(e => e.country === name);
  if (filter !== 'all') es = es.filter(e => e.type === filter);
  return {
    total: es.length,
    study: es.filter(e => e.type === 'study').length,
    travel: es.filter(e => e.type === 'travel').length,
    entries: es
  };
}

function getCountryFill(name) {
  const { study, travel } = getCountryStats(name, currentFilter);
  const total = study + travel;
  if (total === 0) return null;
  if (study === 0) return TRAVEL_COLOR;
  if (travel === 0) return STUDY_COLOR;
  return { study, travel, total };
}

function buildPatterns(d3, features) {
  const defs = svgEl.select('defs');
  features.forEach(f => {
    const name = f.properties.name;
    const patId = 'p_' + name.replace(/[^a-zA-Z]/g, '_');
    if (defs.select('#' + patId).empty()) {
      defs.append('pattern')
        .attr('id', patId).attr('patternUnits', 'userSpaceOnUse')
        .attr('width', 10).attr('height', 10)
        .call(p => {
          p.append('rect').attr('width', 5).attr('height', 10).attr('fill', STUDY_COLOR);
          p.append('rect').attr('x', 5).attr('width', 5).attr('height', 10).attr('fill', TRAVEL_COLOR);
        });
    }
  });
}

function renderMap() {
  if (!svgEl || geoFeatures.length === 0) return;
  svgEl.selectAll('path.country').each(function(d) {
    const name = d.properties.name;
    const fill = getCountryFill(name);
    const el = window._d3.select(this);
    if (!fill) { el.attr('fill', UNVISITED_COLOR); return; }
    if (typeof fill === 'string') { el.attr('fill', fill); return; }
    const patId = 'p_' + name.replace(/[^a-zA-Z]/g, '_');
    el.attr('fill', `url(#${patId})`);
  });
  svgEl.selectAll('path.country').style('cursor', d => {
    const { total } = getCountryStats(d.properties.name, 'all');
    return total > 0 ? 'pointer' : 'default';
  });
}

// ============================================================
//  ツールチップ
// ============================================================
const tooltip = document.getElementById('tooltip');

function showTooltip(event, name) {
  const stats = getCountryStats(name, 'all');
  if (stats.total === 0) { hideTooltip(); return; }

  let html = `<div class="tt-country">${EMOJIS[name] || '🌍'} ${name}</div>`;
  stats.entries.forEach(e => {
    const isStudy = e.type === 'study';
    html += `<div class="tt-entry" style="border-left-color:${isStudy ? STUDY_COLOR : TRAVEL_COLOR}">
      <div class="tt-name">${e.nickname}
        <span class="tt-badge" style="background:${isStudy ? '#E6F1FB' : '#FAEEDA'};color:${isStudy ? '#0C447C' : '#633806'}">${isStudy ? '留学' : '旅行'}</span>
      </div>
      <div class="tt-detail">${isStudy ? '🎓' : '📍'} ${e.detail}</div>
      <div class="tt-comment">"${e.comment}"</div>
    </div>`;
  });
  tooltip.innerHTML = html;

  const wRect = document.getElementById('map-wrap').getBoundingClientRect();
  let x = event.clientX - wRect.left + 14;
  let y = event.clientY - wRect.top + 14;
  if (x + 260 > wRect.width) x = event.clientX - wRect.left - 265;
  if (y + 220 > wRect.height) y = event.clientY - wRect.top - 200;
  tooltip.style.left = Math.max(4, x) + 'px';
  tooltip.style.top = Math.max(4, y) + 'px';
  tooltip.style.opacity = '1';
}

function hideTooltip() { tooltip.style.opacity = '0'; }

// ============================================================
//  統計パネル更新
// ============================================================
function updateStats() {
  const visited = [...new Set(entries.map(e => e.country))];
  const studyCount = entries.filter(e => e.type === 'study').length;
  const travelCount = entries.filter(e => e.type === 'travel').length;

  document.getElementById('h-countries').textContent = visited.length;
  document.getElementById('h-study').textContent = studyCount;
  document.getElementById('h-travel').textContent = travelCount;
  document.getElementById('s-countries').textContent = visited.length;
  document.getElementById('s-total').textContent = entries.length;
  document.getElementById('adv-count').textContent = `193カ国中 ${visited.length}カ国制覇`;

  const counts = {};
  entries.forEach(e => { counts[e.country] = (counts[e.country] || 0) + 1; });
  const top3 = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 3);
  const top3El = document.getElementById('top3');
  if (top3.length === 0) {
    top3El.innerHTML = '<div class="empty-msg">まだ渡航情報がありません</div>';
  } else {
    top3El.innerHTML = top3.map(([country, cnt], i) => `
      <div class="top3-item ${i === 0 ? 'top3-gold' : ''}">
        <span style="font-size:13px;font-weight:500;color:${i === 0 ? '#BA7517' : '#888'};min-width:22px">#${i+1}</span>
        <span style="font-size:12px;flex:1;color:#111">${EMOJIS[country] || '🌍'} ${country}</span>
        <span style="font-size:11px;color:#888">${cnt}件</span>
      </div>`).join('');
  }

  const rl = document.getElementById('recent-list');
  if (entries.length === 0) {
    rl.innerHTML = '<div class="empty-msg">まだ投稿がありません</div>';
  } else {
    rl.innerHTML = [...entries].reverse().slice(0, 4).map(e => `
      <div class="r-item">
        <div class="dot" style="background:${e.type === 'study' ? STUDY_COLOR : TRAVEL_COLOR}"></div>
        <div>
          <div class="r-head">${e.nickname} — ${EMOJIS[e.country] || '🌍'}${e.country}</div>
          <div class="r-txt">${e.comment}</div>
        </div>
      </div>`).join('');
  }
}

// ============================================================
//  D3地図の初期化
// ============================================================
Promise.all([
  import('https://cdn.jsdelivr.net/npm/d3@7/+esm'),
  import('https://cdn.jsdelivr.net/npm/topojson-client@3/+esm'),
  fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(r => r.json())
]).then(([d3, topojson, world]) => {
  window._d3 = d3;

  const countries = topojson.feature(world, world.objects.countries);
  geoFeatures = countries.features;
  geoFeatures.forEach(f => {
    if (!f.properties) f.properties = {};
    const mapped = NAME_MAP[String(f.id).padStart(3, '0')];
    if (mapped) f.properties.name = mapped;
    else if (!f.properties.name) f.properties.name = 'Unknown';
  });

  const svg = d3.select('#map-svg');
  svgEl = svg;
  svg.style('background', '#c8dde8');
  svg.append('defs');
  buildPatterns(d3, geoFeatures);

  const proj = d3.geoNaturalEarth1().scale(153).translate([480, 250]);
  const pathFn = d3.geoPath(proj);

  svg.selectAll('path.country')
    .data(geoFeatures).join('path')
    .attr('class', 'country')
    .attr('d', pathFn)
    .attr('stroke', '#ffffff')
    .attr('stroke-width', 0.4)
    .attr('fill', UNVISITED_COLOR)
    .style('cursor', 'default')
    .on('mousemove', function(event, d) { showTooltip(event, d.properties.name); })
    .on('mouseleave', () => hideTooltip());

  svg.append('path')
    .datum(topojson.mesh(world, world.objects.countries, (a, b) => a !== b))
    .attr('fill', 'none')
    .attr('stroke', '#ffffff')
    .attr('stroke-width', 0.3)
    .attr('d', pathFn);

  document.getElementById('loading-overlay').classList.add('hidden');

  // Firebase リアルタイムリスナー
  onValue(entriesRef, snapshot => {
    const data = snapshot.val();
    entries = data ? Object.values(data) : [];
    buildPatterns(d3, geoFeatures);
    renderMap();
    updateStats();
    const dot = document.getElementById('sync-dot');
    dot.classList.add('connected');
    dot.classList.remove('error');
    document.getElementById('sync-label').textContent = 'リアルタイム同期中';
  }, () => {
    const dot = document.getElementById('sync-dot');
    dot.classList.add('error');
    dot.classList.remove('connected');
    document.getElementById('sync-label').textContent = '接続エラー';
  });

}).catch(err => {
  console.error(err);
  document.getElementById('loading-overlay').textContent = '地図の読み込みに失敗しました';
});

// ============================================================
//  UI インタラクション（グローバル関数）
// ============================================================
window.setFilter = function(btn) {
  currentFilter = btn.dataset.f;
  document.querySelectorAll('.fbtn').forEach(b => {
    b.className = 'fbtn';
    if (b.dataset.f === currentFilter)
      b.classList.add(
        currentFilter === 'all' ? 'active-all' :
        currentFilter === 'study' ? 'active-study' : 'active-travel'
      );
  });
  renderMap();
};

window.setType = function(btn) {
  currentType = btn.dataset.t;
  document.querySelectorAll('.tbtn').forEach(b => b.className = 'tbtn');
  btn.classList.add(currentType === 'study' ? 'ts' : 'tt');
  document.getElementById('f-detail-label').innerHTML =
    (currentType === 'study' ? '大学名' : 'おすすめスポット') + ' <span class="req">*</span>';
  document.getElementById('f-detail').placeholder =
    currentType === 'study' ? '例：University of Edinburgh' : '例：グランドキャニオン';
};

window.submitEntry = async function() {
  const nick = document.getElementById('f-nick').value.trim();
  const country = document.getElementById('f-country').value;
  const detail = document.getElementById('f-detail').value.trim();
  const comment = document.getElementById('f-comment').value.trim();
  const err = document.getElementById('err');
  const flash = document.getElementById('flash');
  const btn = document.getElementById('submit-btn');

  if (!nick)    { err.textContent = 'ニックネームを入力してください'; err.style.display = 'block'; return; }
  if (!country) { err.textContent = '国名を選択してください'; err.style.display = 'block'; return; }
  if (!detail)  { err.textContent = (currentType === 'study' ? '大学名' : 'おすすめスポット') + 'を入力してください'; err.style.display = 'block'; return; }
  if (!comment) { err.textContent = 'コメントを入力してください'; err.style.display = 'block'; return; }
  err.style.display = 'none';

  btn.disabled = true;
  btn.textContent = '送信中...';
  try {
    await push(entriesRef, { nickname: nick, country, type: currentType, comment, detail, timestamp: Date.now() });
    document.getElementById('f-nick').value = '';
    document.getElementById('f-country').value = '';
    document.getElementById('f-comment').value = '';
    document.getElementById('f-detail').value = '';
    flash.style.display = 'block';
    setTimeout(() => flash.style.display = 'none', 2500);
  } catch(e) {
    err.textContent = '送信に失敗しました。もう一度お試しください。';
    err.style.display = 'block';
  }
  btn.disabled = false;
  btn.textContent = '地図に追加する';
};
</script>
